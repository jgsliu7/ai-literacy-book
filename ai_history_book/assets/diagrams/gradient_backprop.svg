<rect class="box" x="770" y="145" width="120" height="70"/><text class="small" x="795" y="188">中间层</text>
<rect class="box" x="920" y="145" width="120" height="70"/><text class="small" x="953" y="188">输出</text>
<path class="line arrow" d="M740 180 L770 180"/><path class="line arrow" d="M890 180 L920 180"/>
<path class="line arrow" d="M980 235 C920 300, 820 300, 680 235"/>
<text class="small" x="680" y="335">反向传播：把最终错误分摊回前面各层，告诉参数怎么改</text>

