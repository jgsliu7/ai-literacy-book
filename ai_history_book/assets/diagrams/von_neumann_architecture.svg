<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img">
<style>
.bg{fill:#ffffff} .title{font:700 34px Arial,'Noto Sans SC',sans-serif;fill:#212529} .label{font:600 22px Arial,'Noto Sans SC',sans-serif;fill:#212529} .small{font:18px Arial,'Noto Sans SC',sans-serif;fill:#495057} .tiny{font:15px Arial,'Noto Sans SC',sans-serif;fill:#6c757d} .box{fill:#f8f9fa;stroke:#495057;stroke-width:2;rx:8} .dark{fill:#495057} .line{stroke:#495057;stroke-width:3;fill:none} .dash{stroke:#adb5bd;stroke-width:2;stroke-dasharray:8 7;fill:none} .accent{fill:#e9ecef;stroke:#343a40;stroke-width:2;rx:8} .arrow{marker-end:url(#arrow)}
</style>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 z" fill="#495057"/></marker></defs>
<rect class="bg" x="0" y="0" width="100%" height="100%"/>

<text class="title" x="60" y="70">冯·诺依曼架构</text>
<rect class="box" x="95" y="170" width="230" height="110"/><text class="label" x="165" y="235">输入</text>
<rect class="accent" x="435" y="125" width="260" height="120"/><text class="label" x="505" y="195">存储器</text><text class="tiny" x="468" y="225">程序和数据共同存放</text>
<rect class="box" x="420" y="355" width="125" height="105"/><text class="label" x="455" y="415">控制器</text>
<rect class="box" x="585" y="355" width="125" height="105"/><text class="label" x="615" y="415">运算器</text>
<rect class="box" x="805" y="170" width="230" height="110"/><text class="label" x="875" y="235">输出</text>
<path class="line arrow" d="M325 225 L435 190"/><path class="line arrow" d="M695 190 L805 225"/>
<path class="line arrow" d="M565 245 L500 355"/><path class="line arrow" d="M565 245 L635 355"/><path class="line arrow" d="M545 408 L585 408"/>
<path class="dash" d="M500 355 L565 245 L635 355"/>

</svg>