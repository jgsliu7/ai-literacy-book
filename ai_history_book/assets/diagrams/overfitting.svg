<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img">
<style>
.bg{fill:#fff} .title{font:700 34px Arial,'Noto Sans SC',sans-serif;fill:#212529} .label{font:600 22px Arial,'Noto Sans SC',sans-serif;fill:#212529} .small{font:18px Arial,'Noto Sans SC',sans-serif;fill:#495057} .tiny{font:15px Arial,'Noto Sans SC',sans-serif;fill:#6c757d} .box{fill:#f8f9fa;stroke:#495057;stroke-width:2;rx:8} .accent{fill:#e9ecef;stroke:#343a40;stroke-width:2;rx:8} .line{stroke:#495057;stroke-width:3;fill:none} .thin{stroke:#adb5bd;stroke-width:2;fill:none} .dash{stroke:#adb5bd;stroke-width:2;stroke-dasharray:8 7;fill:none} .dot{fill:#495057} .pale{fill:#f1f3f5;stroke:#adb5bd;stroke-width:2} .arrow{marker-end:url(#arrow)}
</style>
<defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 z" fill="#495057"/></marker></defs>
<rect class="bg" width="100%" height="100%"/>

<text class="title" x="60" y="70">过拟合：背熟练习题，不等于会做新题</text>
<rect class="box" x="80" y="135" width="440" height="360"/><text class="label" x="205" y="180">学会规律</text>
<line class="thin" x1="125" y1="430" x2="475" y2="430"/><line class="thin" x1="125" y1="220" x2="125" y2="430"/>
<path class="line" d="M135 395 C210 350, 270 295, 455 245"/>
<circle class="dot" cx="170" cy="372" r="7"/><circle class="dot" cx="245" cy="325" r="7"/><circle class="dot" cx="310" cy="290" r="7"/><circle class="dot" cx="390" cy="258" r="7"/>
<text class="small" x="150" y="475">训练题好，新题也能迁移</text>
<rect class="box" x="580" y="135" width="440" height="360"/><text class="label" x="705" y="180">死背噪声</text>
<line class="thin" x1="625" y1="430" x2="975" y2="430"/><line class="thin" x1="625" y1="220" x2="625" y2="430"/>
<path class="line" d="M635 398 C670 250, 705 450, 750 300 C800 130, 850 430, 970 235"/>
<circle class="dot" cx="670" cy="375" r="7"/><circle class="dot" cx="745" cy="318" r="7"/><circle class="dot" cx="810" cy="280" r="7"/><circle class="dot" cx="890" cy="265" r="7"/>
<text class="small" x="640" y="475">训练题很好，新题容易翻车</text>

</svg>